<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MangoScan — Ripeness Detector</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
/* ── reset & tokens ──────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:          #09090b;
  --surface:     #111113;
  --card:        #18181b;
  --border:      rgba(255,255,255,0.07);
  --border-gold: rgba(212,163,10,0.35);
  --gold:        #D4A30A;
  --gold-hi:     #F5C842;
  --gold-dim:    rgba(212,163,10,0.12);
  --text:        #FAFAF9;
  --muted:       #71717A;
  --subtle:      #3F3F46;

  /* class colours */
  --ripe:        #22C55E;
  --partial:     #F59E0B;
  --unripe:      #86EFAC;
  --rotten:      #EF4444;

  --radius-sm:   8px;
  --radius-md:   14px;
  --radius-lg:   20px;
}

html, body {
  width: 100%; min-height: 100vh;
  background: var(--bg); color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 15px; line-height: 1.65;
  -webkit-font-smoothing: antialiased;
}

/* ── page shell ──────────────────────────────────────────────────────────── */
.page {
  max-width: 960px; margin: 0 auto;
  padding: 2.5rem 1.5rem 5rem;
}

/* ── header ──────────────────────────────────────────────────────────────── */
header {
  display: flex; align-items: center; gap: 1.1rem;
  margin-bottom: 2.5rem;
}
.logo {
  width: 52px; height: 52px; border-radius: 50%;
  background: var(--gold-dim); border: 1.5px solid var(--border-gold);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.6rem; flex-shrink: 0;
}
.logo-text h1 {
  font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 800;
  color: var(--text); letter-spacing: -0.4px;
}
.logo-text span {
  font-size: 12px; color: var(--muted); font-weight: 300;
  display: block; margin-top: 1px;
}
.model-badge {
  margin-left: auto;
  display: inline-flex; align-items: center; gap: 7px;
  padding: 6px 14px; border-radius: 30px;
  background: var(--card); border: 1px solid var(--border);
  font-size: 12px; color: var(--muted); font-weight: 400;
}
.dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--gold); flex-shrink: 0;
  box-shadow: 0 0 6px var(--gold);
}

/* ── two-column layout ───────────────────────────────────────────────────── */
.layout {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1.25rem;
  align-items: start;
}
@media (max-width: 640px) { .layout { grid-template-columns: 1fr; } }

/* ── panel card ──────────────────────────────────────────────────────────── */
.panel {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
}
.panel-head {
  padding: 13px 18px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  display: flex; align-items: center; justify-content: space-between;
}
.panel-label {
  font-size: 10.5px; font-weight: 500; letter-spacing: 1px;
  text-transform: uppercase; color: var(--muted);
  display: flex; align-items: center; gap: 6px;
}
.panel-label svg { opacity: 0.6; }

/* ── camera / upload area ────────────────────────────────────────────────── */
.cam-wrap {
  position: relative;
  aspect-ratio: 1 / 1;
  background: #050505;
  overflow: hidden;
  cursor: pointer;
}
#videoEl {
  width: 100%; height: 100%;
  object-fit: cover; display: block;
}
#previewImg {
  width: 100%; height: 100%;
  object-fit: cover; display: none;
}
.cam-overlay {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 10px;
  background: rgba(9,9,11,0.82);
  transition: opacity 0.2s;
}
.cam-overlay.hidden { opacity: 0; pointer-events: none; }
.cam-overlay-icon {
  width: 54px; height: 54px; border-radius: 50%;
  background: var(--gold-dim); border: 1px solid var(--border-gold);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.4rem;
}
.cam-overlay p { font-size: 13px; color: var(--muted); }
.cam-overlay small { font-size: 11px; color: var(--subtle); }

/* scan line animation on live mode */
.scan-line {
  position: absolute; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold-hi), transparent);
  opacity: 0;
  animation: scan 2s linear infinite;
}
@keyframes scan {
  0%   { top: 0%;   opacity: 0; }
  5%   { opacity: 1; }
  95%  { opacity: 1; }
  100% { top: 100%; opacity: 0; }
}
.scanning .scan-line { opacity: 1; }

/* corners overlay for live view */
.corners {
  position: absolute; inset: 12px; pointer-events: none;
  display: none;
}
.corners::before, .corners::after,
.corners span::before, .corners span::after {
  content: '';
  position: absolute;
  width: 18px; height: 18px;
  border-color: var(--gold);
  border-style: solid;
  border-width: 0;
}
.corners::before  { top:0; left:0;  border-top-width:2px; border-left-width:2px;  border-radius: 3px 0 0 0; }
.corners::after   { top:0; right:0; border-top-width:2px; border-right-width:2px; border-radius: 0 3px 0 0; }
.corners span::before { bottom:0; left:0;  border-bottom-width:2px; border-left-width:2px;  border-radius: 0 0 0 3px; }
.corners span::after  { bottom:0; right:0; border-bottom-width:2px; border-right-width:2px; border-radius: 0 0 3px 0; }

/* ── controls row ────────────────────────────────────────────────────────── */
.controls {
  display: flex; gap: 8px; padding: 14px 16px;
  flex-wrap: wrap;
}
.btn {
  flex: 1; min-width: 80px;
  display: flex; align-items: center; justify-content: center; gap: 6px;
  padding: 9px 14px; border-radius: var(--radius-sm);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px; font-weight: 500;
  cursor: pointer; border: 1px solid var(--border);
  background: var(--surface); color: var(--text);
  transition: all 0.15s ease;
}
.btn:hover  { border-color: var(--border-gold); background: var(--gold-dim); }
.btn:active { transform: scale(0.97); }
.btn:disabled { opacity: 0.35; cursor: not-allowed; pointer-events: none; }
.btn.primary {
  background: var(--gold); border-color: var(--gold); color: #09090b;
  font-weight: 600;
}
.btn.primary:hover { background: var(--gold-hi); border-color: var(--gold-hi); }
.btn svg { width: 15px; height: 15px; flex-shrink: 0; }

/* upload row */
.upload-strip {
  border-top: 1px solid var(--border);
  padding: 10px 16px;
  display: flex; align-items: center; gap: 10px;
}
.upload-label {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 7px 14px; border-radius: var(--radius-sm);
  border: 1px dashed var(--border-gold); color: var(--gold);
  font-size: 12px; font-weight: 500; cursor: pointer;
  transition: background 0.15s;
}
.upload-label:hover { background: var(--gold-dim); }
.upload-label svg { width: 14px; height: 14px; }
#imgInput { display: none; }
.upload-hint { font-size: 11px; color: var(--muted); }

/* ── result panel ────────────────────────────────────────────────────────── */
.result-body { padding: 20px; min-height: 320px; display: flex; flex-direction: column; }

/* empty state */
.empty-state {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 10px;
  color: var(--muted); text-align: center;
}
.empty-icon { font-size: 2.5rem; opacity: 0.3; }
.empty-state p { font-size: 13px; color: var(--subtle); }

/* loading state */
.loading-state {
  flex: 1; display: none; flex-direction: column;
  align-items: center; justify-content: center; gap: 14px;
}
.spinner {
  width: 36px; height: 36px;
  border: 3px solid var(--border);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin 0.75s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-state p { font-size: 13px; color: var(--muted); }

/* result content */
.result-content { display: none; flex-direction: column; gap: 18px; }

.result-hero {
  display: flex; align-items: center; gap: 14px;
}
.result-emoji { font-size: 3rem; line-height: 1; }
.result-meta { flex: 1; }
.result-label {
  font-family: 'Syne', sans-serif;
  font-size: 22px; font-weight: 800;
  text-transform: capitalize; letter-spacing: -0.3px;
}
.result-conf {
  font-size: 13px; color: var(--muted); margin-top: 2px;
}
.result-conf strong { color: var(--text); font-weight: 500; }
.result-desc {
  font-size: 12px; color: var(--muted); font-style: italic;
  margin-top: 4px;
}

/* confidence bars */
.bars { display: flex; flex-direction: column; gap: 9px; }
.bar-row { display: flex; flex-direction: column; gap: 4px; }
.bar-top {
  display: flex; justify-content: space-between; align-items: baseline;
}
.bar-name {
  font-size: 11.5px; font-weight: 500; text-transform: capitalize; color: var(--muted);
}
.bar-pct { font-size: 11.5px; font-weight: 500; color: var(--text); }
.bar-track {
  height: 6px; border-radius: 3px;
  background: rgba(255,255,255,0.05);
  overflow: hidden;
}
.bar-fill {
  height: 100%; border-radius: 3px;
  width: 0%;
  transition: width 0.7s cubic-bezier(0.4, 0, 0.2, 1);
}

/* advice box */
.advice {
  padding: 12px 14px; border-radius: var(--radius-sm);
  border-left: 3px solid var(--gold);
  background: var(--gold-dim);
  font-size: 12px; color: var(--muted); line-height: 1.6;
}
.advice strong { color: var(--text); font-weight: 500; }

/* error banner */
.error-banner {
  display: none;
  margin: 0 16px 14px;
  padding: 10px 14px; border-radius: var(--radius-sm);
  background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3);
  font-size: 12px; color: #FCA5A5;
}

/* live toggle */
.live-badge {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 11px; color: var(--gold); font-weight: 500;
}
.live-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--gold); animation: blink 1s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }
</style>
</head>
<body>
<div class="page">

  <!-- header -->
  <header>
    <div class="logo">🥭</div>
    <div class="logo-text">
      <h1>MangoScan</h1>
      <span>EfficientNetB0 · 4-class ripeness classifier</span>
    </div>
    <div class="model-badge" id="modelBadge">
      <div class="dot" id="statusDot" style="background:var(--subtle);box-shadow:none"></div>
      <span id="statusText">Connecting…</span>
    </div>
  </header>

  <!-- two-column layout -->
  <div class="layout">

    <!-- LEFT — camera / upload -->
    <div class="panel">
      <div class="panel-head">
        <div class="panel-label">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="14" height="14"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
          Input
        </div>
        <div class="live-badge" id="liveBadge" style="display:none">
          <div class="live-dot"></div> LIVE
        </div>
      </div>

      <div class="cam-wrap" id="camWrap">
        <video id="videoEl" autoplay playsinline muted></video>
        <img id="previewImg" alt="uploaded mango">
        <div class="scan-line"></div>
        <div class="corners"><span></span></div>
        <div class="cam-overlay" id="camOverlay">
          <div class="cam-overlay-icon">🥭</div>
          <p>Point camera or upload a photo</p>
          <small>Camera · Upload · Real-time detection</small>
        </div>
      </div>

      <div class="error-banner" id="errorBanner"></div>

      <div class="controls">
        <button class="btn" id="startBtn" onclick="startCamera()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg>
          Camera
        </button>
        <button class="btn" id="stopBtn" onclick="stopCamera()" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
          Stop
        </button>
        <button class="btn primary" id="detectBtn" onclick="captureAndPredict()" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          Detect
        </button>
      </div>

      <div class="upload-strip">
        <label class="upload-label" for="imgInput">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          Upload image
        </label>
        <input type="file" id="imgInput" accept="image/*" onchange="handleUpload(event)">
        <span class="upload-hint">jpg · png · webp</span>
      </div>
    </div>

    <!-- RIGHT — result -->
    <div class="panel">
      <div class="panel-head">
        <div class="panel-label">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="14" height="14"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
          Result
        </div>
      </div>

      <div class="result-body">
        <!-- empty -->
        <div class="empty-state" id="emptyState">
          <div class="empty-icon">🔍</div>
          <p>No prediction yet</p>
        </div>

        <!-- loading -->
        <div class="loading-state" id="loadingState">
          <div class="spinner"></div>
          <p>Analyzing mango…</p>
        </div>

        <!-- result -->
        <div class="result-content" id="resultContent">
          <div class="result-hero">
            <div class="result-emoji" id="resEmoji"></div>
            <div class="result-meta">
              <div class="result-label" id="resLabel"></div>
              <div class="result-conf" id="resConf"></div>
              <div class="result-desc" id="resDesc"></div>
            </div>
          </div>
          <div class="bars" id="barsContainer"></div>
          <div class="advice" id="adviceBox"></div>
        </div>
      </div>
    </div>

  </div><!-- /layout -->
</div><!-- /page -->

<script>
// ── constants ────────────────────────────────────────────────────────────────
const CLASS_META = {
  ripe:           { emoji:'🥭', color:'#22C55E', advice:'Perfect ripeness — enjoy now or within 1–2 days.' },
  partially_ripe: { emoji:'🟡', color:'#F59E0B', advice:'Almost there. Leave at room temperature for 1–2 days.' },
  unripe:         { emoji:'🟢', color:'#86EFAC', advice:'Still developing. Give it 3–5 more days to ripen fully.' },
  rotten:         { emoji:'🍂', color:'#EF4444', advice:'Past its prime. Not recommended for consumption.' },
};

// ── state ────────────────────────────────────────────────────────────────────
let mediaStream = null;
let liveInterval = null;

// ── DOM refs ─────────────────────────────────────────────────────────────────
const videoEl     = document.getElementById('videoEl');
const previewImg  = document.getElementById('previewImg');
const camOverlay  = document.getElementById('camOverlay');
const camWrap     = document.getElementById('camWrap');
const startBtn    = document.getElementById('startBtn');
const stopBtn     = document.getElementById('stopBtn');
const detectBtn   = document.getElementById('detectBtn');
const liveBadge   = document.getElementById('liveBadge');
const emptyState  = document.getElementById('emptyState');
const loadingState= document.getElementById('loadingState');
const resultContent=document.getElementById('resultContent');
const errorBanner = document.getElementById('errorBanner');
const statusDot   = document.getElementById('statusDot');
const statusText  = document.getElementById('statusText');

// ── backend health check ─────────────────────────────────────────────────────
async function checkHealth() {
  try {
    const r = await fetch('/health');
    if (r.ok) {
      const d = await r.json();
      statusDot.style.cssText  = 'background:#22C55E;box-shadow:0 0 6px #22C55E';
      statusText.textContent   = d.model || 'Model ready';
    } else {
      throw new Error('not ok');
    }
  } catch {
    statusDot.style.cssText = 'background:#EF4444;box-shadow:0 0 6px #EF4444';
    statusText.textContent  = 'Backend offline';
  }
}
checkHealth();

// ── camera ────────────────────────────────────────────────────────────────────
async function startCamera() {
  try {
    mediaStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
    videoEl.srcObject = mediaStream;
    videoEl.style.display = 'block';
    previewImg.style.display = 'none';
    camOverlay.classList.add('hidden');
    camWrap.classList.add('scanning');
    document.querySelector('.corners').style.display = 'block';
    startBtn.disabled = true;
    stopBtn.disabled  = false;
    detectBtn.disabled= false;
    liveBadge.style.display = 'inline-flex';
    showError('');
  } catch (e) {
    showError('Camera access denied: ' + e.message);
  }
}

function stopCamera() {
  if (mediaStream) { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }
  clearInterval(liveInterval); liveInterval = null;
  videoEl.srcObject = null;
  videoEl.style.display = 'none';
  camOverlay.classList.remove('hidden');
  camWrap.classList.remove('scanning');
  document.querySelector('.corners').style.display = 'none';
  startBtn.disabled  = false;
  stopBtn.disabled   = true;
  detectBtn.disabled = true;
  liveBadge.style.display = 'none';
}

// ── capture frame from video → blob ──────────────────────────────────────────
function captureFrame() {
  const canvas = document.createElement('canvas');
  canvas.width  = videoEl.videoWidth  || 224;
  canvas.height = videoEl.videoHeight || 224;
  canvas.getContext('2d').drawImage(videoEl, 0, 0);
  return new Promise(res => canvas.toBlob(res, 'image/jpeg', 0.92));
}

// ── predict via backend ───────────────────────────────────────────────────────
async function predict(blob) {
  showLoading();
  const fd = new FormData();
  fd.append('image', blob, 'frame.jpg');
  try {
    const r = await fetch('/predict', { method: 'POST', body: fd });
    const d = await r.json();
    if (d.error) throw new Error(d.error);
    showResult(d);
  } catch (e) {
    showLoading(false);
    showError('Prediction failed: ' + e.message);
  }
}

async function captureAndPredict() {
  if (!mediaStream) return;
  const blob = await captureFrame();
  await predict(blob);
}

// ── upload ────────────────────────────────────────────────────────────────────
function handleUpload(e) {
  const file = e.target.files[0];
  if (!file) return;
  stopCamera();
  const url = URL.createObjectURL(file);
  previewImg.src = url;
  previewImg.style.display = 'block';
  videoEl.style.display = 'none';
  camOverlay.classList.add('hidden');
  detectBtn.disabled = false;

  // auto-predict on upload
  predict(file);

  // reset input so same file can be re-selected
  e.target.value = '';
}

// Override detect button for uploaded image
detectBtn.addEventListener('click', async () => {
  if (mediaStream) { await captureAndPredict(); return; }
  if (previewImg.src) {
    const r = await fetch(previewImg.src);
    const b = await r.blob();
    predict(b);
  }
});

// ── UI states ─────────────────────────────────────────────────────────────────
function showLoading() {
  emptyState.style.display    = 'none';
  loadingState.style.display  = 'flex';
  resultContent.style.display = 'none';
}

function showResult(data) {
  loadingState.style.display  = 'none';
  resultContent.style.display = 'flex';
  emptyState.style.display    = 'none';

  const label = data.prediction;
  const meta  = CLASS_META[label] || { emoji:'❓', color:'#71717A', advice:'' };

  document.getElementById('resEmoji').textContent = meta.emoji;
  document.getElementById('resLabel').textContent = label.replace('_', ' ');
  document.getElementById('resLabel').style.color = meta.color;
  document.getElementById('resConf').innerHTML =
    `Confidence: <strong>${data.confidence.toFixed(1)}%</strong>`;
  document.getElementById('resDesc').textContent = '';
  document.getElementById('adviceBox').innerHTML =
    `<strong>Advice:</strong> ${meta.advice}`;

  // bars
  const container = document.getElementById('barsContainer');
  container.innerHTML = '';
  const scores = data.scores;
  Object.entries(scores)
    .sort((a,b) => b[1]-a[1])
    .forEach(([cls, pct]) => {
      const m = CLASS_META[cls] || { color:'#71717A' };
      const row = document.createElement('div');
      row.className = 'bar-row';
      row.innerHTML = `
        <div class="bar-top">
          <span class="bar-name">${cls.replace('_',' ')}</span>
          <span class="bar-pct">${pct.toFixed(1)}%</span>
        </div>
        <div class="bar-track">
          <div class="bar-fill" style="background:${m.color}" data-w="${pct}"></div>
        </div>`;
      container.appendChild(row);
    });

  // animate bars after paint
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      container.querySelectorAll('.bar-fill').forEach(el => {
        el.style.width = Math.min(el.dataset.w, 100) + '%';
      });
    });
  });
}

function showError(msg) {
  errorBanner.style.display = msg ? 'block' : 'none';
  errorBanner.textContent   = msg;
}
</script>
</body>
</html>
